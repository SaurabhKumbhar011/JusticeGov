spring.application.name=JusticeGov
server.port=1576

# Database connection properties
spring.datasource.url=jdbc:mysql://localhost:3306/justicegov1
spring.datasource.username=root
spring.datasource.password=Aniket@1572
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Naming strategy - crucial for matching Java camelCase to SQL underscores
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Hibernate properties
# CHANGE: Set to 'update' so your data persists across restarts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.format-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Detailed Error Reporting - This will show you the ACTUAL error in Postman
server.error.include-message=always
server.error.include-binding-errors=always

management.endpoints.web.exposure.include=*